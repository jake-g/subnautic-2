name: CI Pipeline

on:
  # Run on pushes to main (GitHub) and any dev branches (Gitea)
  push:
    branches: [ "main", "dev-*" ]
  # Run on pull requests
  pull_request:
    branches: [ "main" ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13" # Adjust to match your local version
          cache: "pip"

      - name: 📦 Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: 🧪 Run Tests
        env:
          CI: "true"
        run: |
          make test
